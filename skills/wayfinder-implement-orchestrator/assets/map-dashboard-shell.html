<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta http-equiv="refresh" content="60">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wayfinder 票图仪表盘</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 text-slate-900 font-sans">
<div class="max-w-6xl mx-auto px-6 py-10 space-y-10">
  <div id="nodata" class="hidden rounded-lg border border-amber-300 bg-amber-50 p-4 text-sm text-amber-800"></div>

  <header id="statusbar" class="hidden">
    <div class="flex flex-wrap items-baseline gap-3">
      <a id="map-title" href="#" target="_blank" class="font-serif text-2xl font-semibold text-slate-900 hover:text-indigo-700 hover:underline"></a>
      <span id="gate" class="rounded-full border border-indigo-200 bg-indigo-50 px-3 py-0.5 text-sm text-indigo-700"></span>
      <span id="generated" class="ml-auto text-xs text-slate-400"></span>
    </div>
    <div id="counts" class="mt-4 flex flex-wrap gap-2 text-sm"></div>
    <div id="budget" class="mt-3 text-sm text-slate-500"></div>
  </header>

  <section id="sec-dag" class="hidden">
    <h2 class="mb-3 text-xs font-semibold uppercase tracking-wider text-slate-500">依赖 DAG</h2>
    <div id="dag-out" class="overflow-x-auto rounded-lg border border-slate-200 bg-white p-4"></div>
  </section>

  <section id="sec-lanes" class="hidden">
    <h2 class="mb-3 text-xs font-semibold uppercase tracking-wider text-slate-500">Execution lanes</h2>
    <div class="overflow-x-auto rounded-lg border border-slate-200 bg-white p-4">
      <table class="w-full text-left text-sm">
        <thead class="text-xs uppercase tracking-wider text-slate-400">
          <tr><th class="py-2 pr-4">Lane</th><th class="py-2 pr-4">执行通道</th><th class="py-2 pr-4">当前票</th><th class="py-2 pr-4">worktree / branch</th><th class="py-2 pr-4">已耗 vs 上限</th><th class="py-2">状态</th></tr>
        </thead>
        <tbody id="lane-rows" class="divide-y divide-slate-100"></tbody>
      </table>
    </div>
  </section>

  <section id="sec-risks" class="hidden grid gap-4 md:grid-cols-3">
    <div class="rounded-lg border border-slate-200 bg-white p-5">
      <h3 class="mb-3 text-xs font-semibold uppercase tracking-wider text-amber-700">L 豁免票</h3>
      <ul id="risk-waivers" class="space-y-2 text-sm text-slate-700"></ul>
    </div>
    <div class="rounded-lg border border-slate-200 bg-white p-5">
      <h3 class="mb-3 text-xs font-semibold uppercase tracking-wider text-red-700">超估熔断</h3>
      <ul id="risk-fuses" class="space-y-2 text-sm text-slate-700"></ul>
    </div>
    <div class="rounded-lg border border-slate-200 bg-white p-5">
      <h3 class="mb-3 text-xs font-semibold uppercase tracking-wider text-indigo-700">执行期修补票</h3>
      <ul id="risk-patches" class="space-y-2 text-sm text-slate-700"></ul>
    </div>
  </section>

  <section id="sec-census" class="hidden">
    <h2 class="mb-3 text-xs font-semibold uppercase tracking-wider text-slate-500">变更面普查</h2>
    <div id="census-grid" class="grid gap-3 sm:grid-cols-2 lg:grid-cols-3"></div>
  </section>
</div>

<script type="module">
const dataSrc = location.href.replace(/\.html(\?.*)?$/i, "-data.js");

function loadData() {
  return new Promise((resolve) => {
    const s = document.createElement("script");
    s.src = dataSrc + "?t=" + Date.now();
    s.onload = () => resolve(window.WAYFINDER_DATA || null);
    s.onerror = () => resolve(null);
    document.head.appendChild(s);
  });
}

const $ = (id) => document.getElementById(id);
const show = (id) => $(id).classList.remove("hidden");
const esc = (v) => String(v ?? "").replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

const STATES = {
  done:    { label: "done",     pill: "border-emerald-200 bg-emerald-50 text-emerald-700" },
  running: { label: "running",  pill: "border-amber-300 bg-amber-50 text-amber-800" },
  ready:   { label: "ready",    pill: "border-indigo-200 bg-indigo-50 text-indigo-700" },
  blocked: { label: "blocked",  pill: "border-slate-200 bg-slate-100 text-slate-500" },
  fused:   { label: "超估熔断", pill: "border-red-200 bg-red-50 text-red-700" },
  drift:   { label: "漂移",     pill: "border-red-200 bg-red-50 text-red-700" },
};
const stateOf = (s) => STATES[s] ? s : "ready";
const pill = (text, cls) => `<span class="rounded-full border px-2.5 py-0.5 text-xs ${cls}">${esc(text)}</span>`;

function renderStatus(d) {
  const t = $("map-title");
  t.textContent = d.map?.title || "Wayfinder map";
  if (/^https?:\/\//.test(d.map?.url || "")) t.href = d.map.url;
  $("gate").textContent = "gate: " + (d.map?.gate || "?");
  $("generated").textContent = "生成于 " + (d.generatedAt || "?") + "（每 60s 自动刷新）";
  const c = d.totals || {};
  $("counts").innerHTML = ["done", "running", "ready", "blocked"]
    .map((k) => pill(`${STATES[k].label} ${c[k] ?? 0}`, STATES[k].pill)).join(" ");
  if (c.estimateCapMin != null) {
    $("budget").textContent = `总预估上限 ${c.estimateCapMin} min · 已耗墙钟 ${c.spentMin ?? 0} min`;
  }
  show("statusbar");
}

function mermaidSrc(d) {
  const nid = (id) => "t" + String(id).replace(/[^0-9A-Za-z]/g, "");
  const lines = ["graph TD"];
  for (const t of d.tickets || []) {
    const raw = `${t.id}${t.tier ? " [" + t.tier + "]" : ""} ${t.title || ""}`
      .slice(0, 42).replace(/[\\\n\r]/g, " ").replace(/["`]/g, "'");
    const label = raw.trim() || String(t.id);
    const lane = t.lane ? `<br/>${String(t.lane).replace(/[^0-9A-Za-z#-]/g, "")}` : "";
    lines.push(`  ${nid(t.id)}["${label}${lane}"]:::${stateOf(t.state)}`);
    for (const dep of t.blockedBy || []) lines.push(`  ${nid(dep)} --> ${nid(t.id)}`);
  }
  lines.push("  classDef done fill:#ecfdf5,stroke:#10b981,color:#065f46;");
  lines.push("  classDef running fill:#fffbeb,stroke:#f59e0b,color:#92400e;");
  lines.push("  classDef ready fill:#eef2ff,stroke:#6366f1,color:#3730a3;");
  lines.push("  classDef blocked fill:#f1f5f9,stroke:#94a3b8,color:#475569;");
  lines.push("  classDef fused fill:#fef2f2,stroke:#dc2626,color:#991b1b;");
  lines.push("  classDef drift fill:#fef2f2,stroke:#dc2626,color:#991b1b;");
  return lines.join("\n");
}

async function renderDag(d) {
  const tickets = d.tickets || [];
  if (!tickets.length) return;
  show("sec-dag");
  try {
    const mermaid = (await import("https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs")).default;
    mermaid.initialize({ startOnLoad: false, theme: "neutral", securityLevel: "loose" });
    const { svg } = await mermaid.render("dag-svg", mermaidSrc(d));
    $("dag-out").innerHTML = svg;
  } catch {
    $("dag-out").innerHTML = `<p class="mb-2 text-xs text-amber-800">Mermaid CDN 不可用，降级为纯文本依赖列表：</p>`
      + `<ul class="space-y-1 text-sm font-mono text-slate-700">`
      + tickets.map((t) => `<li>${esc(t.id)} [${esc(t.tier || "?")}] ${esc(t.title || "")} ${pill(STATES[stateOf(t.state)].label, STATES[stateOf(t.state)].pill)}${(t.blockedBy || []).length ? ` ← ${esc((t.blockedBy || []).join(", "))}` : ""}</li>`).join("")
      + `</ul>`;
  }
}

function renderLanes(d) {
  const lanes = d.lanes || [];
  if (!lanes.length) return;
  $("lane-rows").innerHTML = lanes.map((l) => {
    const cap = l.capMin ?? 0, spent = l.spentMin ?? 0;
    const over = cap && spent > 2 * cap;
    const bar = cap
      ? `<div class="mt-1 h-1.5 w-36 rounded bg-slate-100"><div class="h-1.5 rounded ${over ? "bg-red-500" : "bg-indigo-500"}" style="width:${Math.min(100, (spent / (2 * cap)) * 100)}%"></div></div>`
      : "";
    const st = stateOf(l.state);
    return `<tr>
      <td class="py-2 pr-4 font-mono">${esc(l.id)}</td>
      <td class="py-2 pr-4">${esc(l.channel || "")}</td>
      <td class="py-2 pr-4 font-mono">${esc(l.current || "—")}</td>
      <td class="py-2 pr-4 font-mono text-xs text-slate-500">${esc(l.worktree || "")}<br/>${esc(l.branch || "")}</td>
      <td class="py-2 pr-4 ${over ? "text-red-700" : ""}">${spent} / ${cap || "?"} min${bar}</td>
      <td class="py-2">${pill(STATES[st].label, STATES[st].pill)}</td>
    </tr>`;
  }).join("");
  show("sec-lanes");
}

function renderRisks(d) {
  const r = d.risks || {};
  const li = (arr, f) => (arr || []).map(f).join("") || `<li class="text-slate-400">（无）</li>`;
  const any = (r.waivers || []).length + (r.fuses || []).length + (r.patches || []).length;
  if (!any && !(d.lanes || []).length) return;
  $("risk-waivers").innerHTML = li(r.waivers, (w) => `<li><span class="font-mono">${esc(w.id)}</span> — ${esc(w.reason)}</li>`);
  $("risk-fuses").innerHTML = li(r.fuses, (f) => `<li><span class="font-mono">${esc(f.id)}</span> — ${esc(f.note)}</li>`);
  $("risk-patches").innerHTML = li(r.patches, (p) => `<li><span class="font-mono">${esc(p.id)}</span> ${esc(p.title)}</li>`);
  show("sec-risks");
}

function renderCensus(d) {
  const rows = d.census || [];
  if (!rows.length) return;
  const cls = {
    green:  "border-emerald-200 bg-emerald-50",
    yellow: "border-amber-300 bg-amber-50",
    red:    "border-red-300 bg-red-50",
  };
  $("census-grid").innerHTML = rows.map((c) => `
    <div class="rounded-lg border p-3 ${cls[c.status] || cls.red}">
      <div class="text-sm font-medium text-slate-800">${esc(c.surface)}</div>
      <div class="mt-1 text-xs text-slate-500">${esc(c.refs || "未着落")}</div>
    </div>`).join("");
  show("sec-census");
}

const data = await loadData();
if (!data) {
  $("nodata").textContent = "未找到数据层 " + dataSrc + "；coordinator 尚未写入或文件名不符（应为 <本页同名>-data.js）。";
  show("nodata");
} else {
  renderStatus(data);
  await renderDag(data);
  renderLanes(data);
  renderRisks(data);
  renderCensus(data);
}
</script>
</body>
</html>
